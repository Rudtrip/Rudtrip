name: Generate streak card

on:
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/streak.yml"

permissions:
  contents: write

concurrency:
  group: streak-card
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate static streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117&ring=7C3AED&fire=8B5CF6&currStreakLabel=A78BFA&sideLabels=C9D1D9&dates=8B949E
          path: assets/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated card
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update streak card"
            git pull --rebase origin main
            git push origin main
          fi
